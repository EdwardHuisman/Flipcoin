<div class="flip-card" onclick="this.classList.toggle('flipped')">
  <div class="flip-card-inner">
    
    <!-- Voorkant -->
    <div class="flip-card-front">
      <img src="voorkant.png" alt="Voorkant munt">
    </div>

    <!-- Achterkant -->
    <div class="flip-card-back">
      <img src="achterkant.png" alt="Achterkant munt">
    </div>

  </div>
</div>

<style>
.flip-card {
  width: 300px;
  height: 300px;
  perspective: 1000px;
  cursor: pointer;
}

.flip-card-inner {
  width: 100%;
  height: 100%;
  transition: transform 0.6s;
  transform-style: preserve-3d;
  position: relative;
}

.flip-card.flipped .flip-card-inner {
  transform: rotateY(180deg);
}

.flip-card-front, .flip-card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
}

.flip-card-front img,
.flip-card-back img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
}

.flip-card-back {
  transform: rotateY(180deg);
}
</style>
