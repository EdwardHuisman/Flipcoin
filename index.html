<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Flip Munt</title>

<style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #f4f4f4;
}

.flip-card {
  width: 300px;
  height: 300px;
  perspective: 1000px;
  cursor: pointer;
}

.flip-card-inner {
  width: 100%;
  height: 100%;
  transition: transform 0.6s;
  transform-style: preserve-3d;
  position: relative;
}

.flipped .flip-card-inner {
  transform: rotateY(180deg);
}

.flip-card-front, .flip-card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
}

.flip-card-front img,
.flip-card-back img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
}

.flip-card-back {
  transform: rotateY(180deg);
}
</style>
</head>

<body>

<div class="flip-card" onclick="this.classList.toggle('flipped')">
  <div class="flip-card-inner">

    <div class="flip-card-front">
      <img src="voorkant.png">
    </div>

    <div class="flip-card-back">
      <img src="achterkant.png">
    </div>

  </div>
</div>

</body>
</html>
